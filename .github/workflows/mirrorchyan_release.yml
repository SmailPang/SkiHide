name: mirrorchyan_release

on:
  workflow_dispatch:
    inputs:
      tag:
        default: ''
        required: false
#   release:
#     types: [released]

jobs:
  mirrorchyan:
    runs-on: ubuntu-latest
    # if: ${{ github.repository_owner == 'SmailPang' }}
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     os: [win, macos, linux]
    #     arch: [aarch64, x86_64]
    steps:
      - uses: MirrorChyan/uploading-action@v1
        with:
          filetype: latest-release
          filename: "*.exe"
          mirrorchyan_rid: SkiHide
          tag: ${{ inputs.tag }}

          owner: SmailPang
          repo: SkiHide
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_token: ${{ secrets.MirrorChyanUploadToken }}

          # os: ${{ matrix.os }}
          # arch: ${{ matrix.arch }}