name: Build Preview EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build single-file EXE (no bundle)
        run: pnpm tauri build --no-bundle

      - name: Prepare versioned preview artifact
        shell: pwsh
        run: |
          $cargoToml = Get-Content -Path "src-tauri/Cargo.toml" -Raw
          if ($cargoToml -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
            throw "Failed to resolve version from src-tauri/Cargo.toml"
          }
          $version = $Matches[1]

          $exe = "src-tauri/target/release/skihide.exe"
          if (!(Test-Path $exe)) {
            throw "Expected $exe not found"
          }

          New-Item -ItemType Directory -Force -Path out | Out-Null
          $outExe = "out/SkiHide-$version.exe"
          Copy-Item $exe -Destination $outExe -Force
          Write-Host "Prepared: $outExe"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: skihide-preview-windows-x64
          path: out/SkiHide-*.exe
          if-no-files-found: error
          retention-days: 14
