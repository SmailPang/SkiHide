name: mirrorchyan_release_note

on:
  workflow_dispatch:
    inputs:
      tag:
        default: ''
        required: false
  release:
    types: [edited]

jobs:
  mirrorchyan:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'SmailPang' }}

    steps:
      - id: uploading
        uses: MirrorChyan/release-note-action@v1
        with:
          mirrorchyan_rid: SkiHide
          version_name: ${{ inputs.tag }}

          owner: SmailPang
          repo: SkiHide
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_token: ${{ secrets.MirrorChyanUploadToken }}
